# ===================== Server =====================
server.port=8080

# ===================== Application =====================
spring.application.name=ERASM

# ===================== MySQL Database =====================
# Change the DB name, username and password below to match your MySQL setup
spring.datasource.url=jdbc:mysql://localhost:3306/erasm_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================== JPA / Hibernate =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===================== JWT =====================
# 256-bit (32+ char) secret key used to sign JWT tokens
erasm.jwt.secret=ThisIsASecretKeyForERASMProjectPleaseChangeItInProduction123456
erasm.jwt.expiration-ms=86400000

# ===================== Logging =====================
logging.level.root=INFO
logging.level.com.erasm=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/erasm.log

# ===================== Springdoc / Swagger =====================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
